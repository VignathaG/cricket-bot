<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bailer — Cricket Rules Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch-green: #1F3D2B;
    --pitch-green-deep: #142819;
    --sightscreen: #F4EFE4;
    --ball-red: #A32C3B;
    --crease-white: #FAFAF7;
    --ink: #16241A;
    --muted: #6E7F6F;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.04), transparent 60%),
      repeating-linear-gradient(
        90deg,
        var(--pitch-green) 0px,
        var(--pitch-green) 120px,
        var(--pitch-green-deep) 120px,
        var(--pitch-green-deep) 240px
      );
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .field {
    width: 100%;
    max-width: 640px;
  }

  .scoreboard-header {
    background: var(--pitch-green-deep);
    border: 3px solid var(--sightscreen);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    padding: 20px 24px;
    color: var(--sightscreen);
    position: relative;
    overflow: hidden;
  }

  .scoreboard-header::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--ball-red) 0 16px, transparent 16px 32px);
    opacity: 0.6;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #B7C9B9;
    margin: 0 0 4px;
  }

  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0 0 6px;
    text-transform: uppercase;
  }

  .title span { color: var(--ball-red); }

  .subtitle {
    font-size: 13.5px;
    color: #C9D6CA;
    margin: 0;
    line-height: 1.5;
  }

  .chat-shell {
    background: var(--crease-white);
    border: 3px solid var(--sightscreen);
    border-radius: 0 0 10px 10px;
    display: flex;
    flex-direction: column;
    height: 560px;
  }

  .overs {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .ball {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 14.5px;
    line-height: 1.55;
    position: relative;
  }

  .ball.user {
    align-self: flex-end;
    background: var(--pitch-green);
    color: var(--sightscreen);
    border-radius: 10px 10px 2px 10px;
  }

  .ball.bot {
    align-self: flex-start;
    background: #EDEAE0;
    border: 1px solid #DCD6C6;
    border-radius: 10px 10px 10px 2px;
  }

  .ball.bot.declined {
    border-color: var(--ball-red);
    background: #F7E9EB;
  }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    opacity: 0.6;
  }

  .out-stamp {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ball-red);
    border: 1.5px solid var(--ball-red);
    padding: 2px 8px;
    border-radius: 3px;
    transform: rotate(-3deg);
    margin-bottom: 6px;
  }

  .composer {
    display: flex;
    gap: 10px;
    padding: 16px;
    border-top: 1px solid #E3DCC9;
    background: var(--sightscreen);
  }

  .composer input {
    flex: 1;
    border: 1.5px solid #D3CBB4;
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: var(--crease-white);
    color: var(--ink);
    outline: none;
  }

  .composer input:focus {
    border-color: var(--pitch-green);
  }

  .composer button {
    background: var(--ball-red);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .composer button:hover { background: #8A2230; }
  .composer button:disabled { background: #C9A5A8; cursor: not-allowed; }

  .hint-row {
    padding: 10px 20px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border: 1px dashed #C9C2AC;
    padding: 4px 9px;
    border-radius: 4px;
    cursor: pointer;
    background: none;
  }

  .hint:hover { border-color: var(--pitch-green); color: var(--pitch-green); }

  .typing {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    align-self: flex-start;
    padding: 4px 0;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #D3CBB4; border-radius: 4px; }
</style>
</head>
<body>

<div class="field">
  <div class="scoreboard-header">
    <p class="eyebrow">Session 5 · Custom Bot</p>
    <h1 class="title">BAILER<span>.</span></h1>
    <p class="subtitle">Your umpire for the Laws of Cricket. Ask about dismissals, overs, no-balls, DRS, follow-ons, and match formats — nothing outside the boundary rope.</p>
  </div>

  <div class="chat-shell">
    <div class="hint-row" id="hintRow">
      <button class="hint" data-q="What counts as LBW?">LBW rules</button>
      <button class="hint" data-q="How does the follow-on work?">Follow-on</button>
      <button class="hint" data-q="What's the capital of France?">off-topic test</button>
    </div>
    <div class="overs" id="overs">
      <div class="ball bot">
        <span class="label">Bailer</span>
        Right then — ask me anything about how the game of cricket is played, and I'll rule on it.
      </div>
    </div>
    <div class="composer">
      <input type="text" id="msgInput" placeholder="Ask a cricket rules question…" autocomplete="off" />
      <button id="sendBtn">Bowl</button>
    </div>
  </div>
</div>

<script>
  const overs = document.getElementById('overs');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const hintRow = document.getElementById('hintRow');

  let history = [];

  function addBall(text, sender, declined = false) {
    const div = document.createElement('div');
    div.className = `ball ${sender}${declined ? ' declined' : ''}`;
    const label = sender === 'user' ? 'You' : 'Bailer';
    div.innerHTML = `<span class="label">${label}</span>${declined ? '<span class="out-stamp">OUT OF SCOPE</span><br/>' : ''}${text}`;
    overs.appendChild(div);
    overs.scrollTop = overs.scrollHeight;
    return div;
  }

  function looksDeclined(text) {
    const t = text.toLowerCase();
    return (t.includes("only handle") || t.includes("only answer") || t.includes("i can only") ||
            t.includes("outside my scope") || t.includes("cricket rules assistant") && t.includes("sorry")) ;
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addBall(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.textContent = 'Bailer is checking the laws…';
    overs.appendChild(typing);
    overs.scrollTop = overs.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });
      const data = await res.json();
      typing.remove();

      if (!res.ok) {
        addBall(`Error: ${data.error || 'something went wrong'}`, 'bot', true);
        return;
      }

      const reply = data.reply;
      const declined = looksDeclined(reply);
      addBall(reply, 'bot', declined);

      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: reply });
      if (history.length > 12) history = history.slice(-12);
    } catch (err) {
      typing.remove();
      addBall('Network error — could not reach the bot.', 'bot', true);
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(input.value));
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(input.value); });
  hintRow.addEventListener('click', (e) => {
    if (e.target.dataset.q) sendMessage(e.target.dataset.q);
  });
</script>

</body>
</html>
